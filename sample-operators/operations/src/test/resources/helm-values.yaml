# Helm values for operations operator E2E test deployment
# Used with the generic-operator-chart from helm/generic-helm-chart/

image:
  repository: operations-operator
  pullPolicy: Never
  tag: "latest"

nameOverride: "operations-operator"

resources: {}

# Primary resources - custom resources that the operator reconciles
primaryResources:
  - apiGroup: "sample.javaoperatorsdk"
    resources:
    - operationscustomresource1s
    - operationscustomresource2s

probes:
  startup:
    enabled: true
    path: /health
  readiness:
    enabled: true
    path: /health

